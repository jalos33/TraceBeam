name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: TraceBeam-windows
          - os: macos-latest
            artifact: TraceBeam-macos
          - os: ubuntu-latest
            artifact: TraceBeam-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pip-audit

      - name: Dependency security audit (open-source/CVE gate)
        run: pip-audit -r requirements.txt

      - name: Build executable
        run: pyinstaller packaging/tracebeam.spec --distpath dist --workpath build --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release zips
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            (cd "$name" && zip -r "../${name}.zip" .)
          done

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/*.zip --repo "${{ github.repository }}" --clobber
          else
            gh release create "$tag" artifacts/*.zip \
              --repo "${{ github.repository }}" --title "$tag" --generate-notes
          fi
