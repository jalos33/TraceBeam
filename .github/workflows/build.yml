name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: TraceBeam-windows
          - os: macos-latest
            artifact: TraceBeam-macos
          - os: ubuntu-latest
            artifact: TraceBeam-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pip-audit

      - name: Dependency security audit (open-source/CVE gate)
        run: pip-audit -r requirements.txt

      - name: Build executable
        run: pyinstaller packaging/tracebeam.spec --distpath dist --workpath build --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
